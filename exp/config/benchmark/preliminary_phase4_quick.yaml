experiment: PreliminaryTDA
seeds: [0]
device: "cpu"
num_workers: 0

common_persistence:
  idx: [0, 2, 4, 6, 7, 9, 11, 13, 16]
  eps: 0.02

tasks:
  - name: mnist_clean
    dataset: MNIST
    transform: null
    power: 0.0

methods:
  persformer:
    runner: run_persformer.py
    args:
      model: PERSFORMER
      d_model: 64
      d_hidden: 128
      num_heads: 4
      num_layers: 2
      encoder_dropout: 0.1
      decoder_dropout: 0.1
      decoder_hidden_dims: "64,64"
      pooling_heads: 4
      norm: layer
      activation: GELU
      norm_first: true
      lr: 0.0005
      weight_decay: 0.0001
      warmup_epochs: 1
      eta_min: 0.000001
      batch_size: 16
      epochs: 1

  resnet:
    runner: run_resnet.py
    args:
      model: ResNet
      d_hidden: 16
      lr: 0.0003
      batch_size: 16
      epochs: 1

  persistent_image:
    runner: run_persistence_image.py
    args:
      resolution: 16
      sigma2: 1.0
      weighting: linear
      weight_power: 1.0
      base_channels: 8
      dropout: 0.1
      lr: 0.0003
      batch_size: 16
      epochs: 1
