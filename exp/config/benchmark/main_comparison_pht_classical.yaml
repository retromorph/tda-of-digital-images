experiment: MainPhtClassical

# seeds: [0, 1, 2]
seeds: [0]
device: "mps"
num_workers: 2

strict_compute: true
budget:
  kind: seconds
  value: 600
  epochs_hint: 60

logging:
  save_best_weights: true

