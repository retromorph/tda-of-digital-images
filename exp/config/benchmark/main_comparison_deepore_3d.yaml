experiment: MainDeePore3D

seeds: [0]
device: "mps"
num_workers: 2

strict_compute: true
budget:
  kind: seconds
  value: 1800
  epochs_hint: 60

logging:
  save_best_weights: true

common_persistence:
  filtration_name: edt_sublevel
  filtration_args:
    ndim: 3
    binarize: otsu
    pore_phase: dark
    phase: pore
    normalize: true
  idx: [0, 1, 2]
  eps: 0.0

tasks:
  - name: deepore_3d
    dataset: DEEPORE-3D
    transform: null
    power: 0.0
    budget:
      kind: seconds
      value: 1800
      epochs_hint: 60

methods:
  persistent_image:
    args:
      resolution: 28
      sigma2: 1.0
      weighting: linear
      weight_power: 1.0
      base_channels: 16
      dropout: 0.1
      lr: 0.0003
      batch_size: 64

  persistent_landscape:
    args:
      num_layers: 5
      resolution: 64
      base_channels: 16
      dropout: 0.1
      lr: 0.0003
      batch_size: 64

  persistent_silhouette:
    args:
      resolution: 64
      weighting: linear
      weight_power: 1.0
      base_channels: 16
      dropout: 0.1
      lr: 0.0003
      batch_size: 64

  deepsets:
    args:
      model: PHTS
      d_model: 128
      d_hidden: 192
      dropout: 0.1
      activation: GELU
      alpha: 0.0
      lr: 0.0001
      batch_size: 64

  persformer:
    args:
      model: PERSFORMER
      d_model: 96
      d_hidden: 192
      num_heads: 4
      num_layers: 3
      encoder_dropout: 0.1
      decoder_dropout: 0.1
      decoder_hidden_dims: "128,64"
      pooling_heads: 4
      norm: layer
      activation: GELU
      alpha: 0.0
      norm_first: true
      lr: 0.0005
      weight_decay: 0.0001
      warmup_epochs: 5
      eta_min: 0.000001
      batch_size: 32

  linear_persformer:
    args:
      model: LINEAR_PERSFORMER
      d_model: 96
      intermediate_size: 192
      num_hidden_layers: 3
      num_attention_heads: 4
      num_landmarks: 32
      encoder_dropout: 0.1
      decoder_dropout: 0.1
      decoder_hidden_dims: "128,64"
      pooling_heads: 4
      activation: GELU
      lr: 0.0005
      weight_decay: 0.0001
      warmup_epochs: 5
      eta_min: 0.000001
      batch_size: 32

  latent_persformer:
    args:
      model: LATENT_PERSFORMER
      d_model: 96
      d_latents: 128
      num_latents: 64
      num_blocks: 1
      num_self_attends_per_block: 2
      num_self_attention_heads: 4
      num_cross_attention_heads: 4
      cross_attention_widening_factor: 1
      self_attention_widening_factor: 1
      dropout: 0.1
      decoder_dropout: 0.1
      decoder_hidden_dims: "128,64"
      activation: GELU
      lr: 0.0005
      weight_decay: 0.0001
      warmup_epochs: 5
      eta_min: 0.000001
      batch_size: 32
