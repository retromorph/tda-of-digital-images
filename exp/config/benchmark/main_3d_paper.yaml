# Main 3D comparison (M7, Series 1.2).
#
# This config defines the SHARED definition of methods/seeds/tasks for both
# convergence and wallclock modes. The two modes are launched by the
# orchestrator script ``exp/pipelines/main_3d_paper.py`` which applies the
# mode-specific budget overrides.
#
# HP per method: hand-edit after running ``exp/pipelines/hp_search.py`` (M6)
# and copying values from ``exp/config/hp_search/best_hp.yaml``.

experiment: Main3D/Paper

device: cuda
num_workers: 0

seeds: [42, 43, 44, 45, 46]
datasets: [DEEPORE-3D, PORESPY-3D]

common_persistence:
  filtration_name: edt_sublevel
  filtration_args:
    binarize: otsu
    pore_phase: dark
    phase: pore
    normalize: false
    ndim: 3
  idx: [0]
  eps: 0.0

logging:
  save_best_weights: true

methods:
  persformer:
    args:
      model: PERSFORMER
      d_model: 128
      d_hidden: 512
      num_layers: 4
      num_heads: 8
      encoder_dropout: 0.0
      decoder_dropout: 0.2
      activation: GELU
      warmup_epochs: 1
      eta_min: 0.01
      batch_size: 32
      lr: 0.0003          # REPLACE from best_hp.yaml after M6
      weight_decay: 0.0   # REPLACE from best_hp.yaml after M6

  latent_persformer:
    args:
      model: LATENT_PERSFORMER
      d_model: 128
      d_latents: 256
      num_latents: 64
      num_blocks: 1
      num_self_attends_per_block: 4
      num_self_attention_heads: 8
      num_cross_attention_heads: 8
      cross_attention_widening_factor: 1
      self_attention_widening_factor: 1
      dropout: 0.1
      decoder_dropout: 0.2
      activation: GELU
      pooling: attn
      warmup_epochs: 1
      eta_min: 0.01
      batch_size: 32
      lr: 0.0003
      weight_decay: 0.0

  linear_persformer:
    args:
      model: LINEAR_PERSFORMER
      d_model: 128
      intermediate_size: 512
      num_hidden_layers: 4
      num_attention_heads: 8
      encoder_dropout: 0.0
      decoder_dropout: 0.2
      activation: GELU
      warmup_epochs: 1
      eta_min: 0.01
      batch_size: 32
      lr: 0.0003
      weight_decay: 0.0

  deepsets:
    args:
      model: PHTS
      d_model: 128
      d_hidden: 256
      dropout: 0.1
      activation: GELU
      warmup_epochs: 1
      eta_min: 0.01
      batch_size: 32
      lr: 0.001
      weight_decay: 0.0

modes:
  converge:
    scheduler: warmup_cosine
    budget:
      kind: epochs
      value: 200
    early_stop:
      patience: 20
      min_delta: 0.0

  wallclock:
    # Plan: constant LR (scheduler=none) so Pareto-curve metrics aren't confounded
    # by where in the cosine schedule we read out.
    scheduler: none
    budget:
      kind: seconds
      value: 2700        # 45 min outer cap
      snapshots: [300, 900, 2700]
