experiment: SmokePhtClassicalPorous

seeds: [0]
device: "mps"
num_workers: 0

strict_compute: false
budget:
  kind: seconds
  value: 120
  epochs_hint: 4

common_persistence:
  filtration_name: pht_classical
  filtration_args:
    alphas: [0, 45, 90, 135]
    binarize: otsu
    pore_phase: dark
  idx: [0, 1, 2, 3]
  eps: 0.0

logging:
  save_best_weights: false

tasks:
  - name: porous2d_clean
    dataset: POROUS2D-CLEAN
    transform: null
    power: 0.0

methods:
  latent_persformer:
    args:
      model: LATENT_PERSFORMER
      d_model: 96
      d_latents: 128
      num_latents: 64
      num_blocks: 1
      num_self_attends_per_block: 2
      num_self_attention_heads: 4
      num_cross_attention_heads: 4
      cross_attention_widening_factor: 1
      self_attention_widening_factor: 1
      dropout: 0.1
      decoder_dropout: 0.1
      decoder_hidden_dims: "128,64"
      activation: GELU
      lr: 0.0005
      weight_decay: 0.0001
      warmup_epochs: 1
      eta_min: 0.00005
      batch_size: 64
