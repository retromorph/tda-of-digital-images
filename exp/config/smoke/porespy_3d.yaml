# Smoke config for PORESPY-3D (M3 acceptance).
#
# Run via:
#   PORESPY_SYNTH_N_SAMPLES=32 PORESPY_SYNTH_SHAPE=32x32x32 \
#     uv run python runner.py --config exp/config/smoke/porespy_3d.yaml
#
# Defaults (1000 samples, 64^3) take ~5-10 min on first run to build the cache.

run_name: ${dataset.name}_${model.name}_${seed}_smoke
seed: 0
device: cpu
num_workers: 0

dataset:
  name: PORESPY-3D
  args:
    fractions: [0.8333333333, 0.1666666667]
  test_time:
    transform: null
    power: 0.0

filtration:
  name: edt_sublevel
  args:
    binarize: otsu
    pore_phase: dark
    phase: pore
    normalize: false
    ndim: 3
  diagram_idx: [0]
  positional_encoding: sin5

encoder: null

model:
  name: PHTS
  args:
    d_model: 64
    d_hidden: 128

training:
  batch_size: 8
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0
  scheduler:
    name: none
    warmup_epochs: 0
    eta_min: 0.0
  budget:
    kind: epochs
    value: 1
  early_stop:
    metric: loss_val
    patience: 0
    min_delta: 0.0

logging:
  experiment: Smoke/PORESPY-3D
  tags:
    milestone: M3
